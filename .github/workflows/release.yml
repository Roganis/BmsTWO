name: release

# Builds the runnable artifacts and creates a (draft) GitHub Release when a
# v* tag is pushed. The release is created in one final job after both builds
# finish, so there is no race creating the draft.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (Qt6 / MinGW)
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          host: windows
          target: desktop
          arch: win64_mingw
          modules: 'qt5compat qtmultimedia'
          tools: 'tools_mingw1310'
          add-tools-to-path: true
          cache: true

      - name: Build (release)
        run: |
          mkdir build
          cd build
          qmake ..\src\bmsone.pro CONFIG-=debug CONFIG+=release
          mingw32-make -j2

      - name: Deploy Qt runtime (windeployqt)
        run: |
          mkdir build\dist
          copy build\release\BmsONE.exe build\dist\
          "%QT_ROOT_DIR%\bin\windeployqt.exe" --release --no-translations --compiler-runtime build\dist\BmsONE.exe
          for %%D in (libgcc_s_seh-1 libstdc++-6 libwinpthread-1) do copy "%QT_ROOT_DIR%\bin\%%D.dll" build\dist\ >nul 2>&1

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path build/dist/* -DestinationPath "BmsONE-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: BmsONE-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Linux (Qt6 / AppImage)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential qt6-base-dev qt6-multimedia-dev \
            libqt6core5compat6-dev qt6-tools-dev-tools \
            libgl1-mesa-dev libfuse2 libxcb-cursor0

      - name: Build (release)
        run: |
          mkdir -p build
          cd build
          qmake6 ../src/bmsone.pro CONFIG-=debug CONFIG+=release
          make -j"$(nproc)"

      - name: Assemble AppDir
        run: |
          cd build
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/64x64/apps
          cp BmsONE AppDir/usr/bin/BmsONE
          cp ../deploy/linux/BmsONE.desktop AppDir/usr/share/applications/BmsONE.desktop
          cp ../src/images/bmsone64.png AppDir/usr/share/icons/hicolor/64x64/apps/bmsone64.png

      - name: Package AppImage (linuxdeploy + qt plugin)
        run: |
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          export QMAKE="$(which qmake6)"
          export OUTPUT="BmsONE-${{ github.ref_name }}-linux-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -d AppDir/usr/share/applications/BmsONE.desktop \
            -i AppDir/usr/share/icons/hicolor/64x64/apps/bmsone64.png \
            --plugin qt --output appimage

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: build/BmsONE-*-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
