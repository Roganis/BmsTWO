name: release

# Builds the runnable artifacts and creates a (draft) GitHub Release.
# Triggers on a pushed v* tag, or via manual dispatch with a `tag` input
# (used where tags can't be pushed directly). The release is created in one
# final job after both builds finish, so there is no race creating the draft.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.3.0)'
        required: true
        default: 'v0.3.0'

permissions:
  contents: write

# Run JS-based actions (checkout, upload/download-artifact) on Node 24;
# silences the Node 20 deprecation warning and is forward-compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    name: Windows (Qt6 / MinGW)
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          host: windows
          target: desktop
          arch: win64_mingw
          modules: 'qt5compat qtmultimedia'
          tools: 'tools_mingw1310'
          add-tools-to-path: true
          cache: true

      - name: Build (release)
        run: |
          mkdir build
          cd build
          qmake ..\src\bmstwo.pro CONFIG-=debug CONFIG+=release
          mingw32-make -j2

      - name: Deploy Qt runtime (windeployqt)
        run: |
          mkdir build\dist
          copy build\release\BmsTWO.exe build\dist\
          "%QT_ROOT_DIR%\bin\windeployqt.exe" --release --no-translations --compiler-runtime build\dist\BmsTWO.exe
          for %%D in (libgcc_s_seh-1 libstdc++-6 libwinpthread-1) do copy "%QT_ROOT_DIR%\bin\%%D.dll" build\dist\ >nul 2>&1

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path build/dist/* -DestinationPath "BmsTWO-${{ github.event.inputs.tag || github.ref_name }}-windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: BmsTWO-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Linux (Qt6 / AppImage)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Official Qt binaries (same 6.11.1 as the dev machine) instead of Ubuntu
      # 24.04's distro Qt 6.4.2 - see build.yml for the rationale.
      - name: Install Qt6 (official binaries)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: 'qt5compat qtmultimedia'
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev libfuse2 libpulse0 \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-shape0

      - name: Build (release)
        run: |
          mkdir -p build
          cd build
          qmake ../src/bmstwo.pro CONFIG-=debug CONFIG+=release
          make -j"$(nproc)"

      - name: Assemble AppDir
        run: |
          cd build
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/64x64/apps
          cp BmsTWO AppDir/usr/bin/BmsTWO
          cp ../deploy/linux/BmsTWO.desktop AppDir/usr/share/applications/BmsTWO.desktop
          cp ../src/images/bmstwo64.png AppDir/usr/share/icons/hicolor/64x64/apps/bmstwo64.png

      - name: Package AppImage (linuxdeploy + qt plugin)
        run: |
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export OUTPUT="BmsTWO-${{ github.event.inputs.tag || github.ref_name }}-linux-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -d AppDir/usr/share/applications/BmsTWO.desktop \
            -i AppDir/usr/share/icons/hicolor/64x64/apps/bmstwo64.png \
            --plugin qt --output appimage

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: build/BmsTWO-*-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: dist/**/*
